<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Speech-to-Text Test</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8FAF9;--card:#ffffff;--text:#1A1D26;--muted:#6B7280;
  --green:#059669;--red:#DC2626;--border:#E5E7EB;--accent:#059669;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:420px;margin:0 auto}
h2{font-size:18px;margin-bottom:16px;color:var(--accent)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px}
.input-row{display:flex;gap:6px;align-items:center}
.input-row input{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;outline:none}
.input-row input:focus{border-color:var(--accent)}
.mic-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s;font-size:20px}
.mic-btn:active{transform:scale(.93)}
.mic-btn.listening{border-color:var(--red);background:#FEF2F2;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.status{font-size:12px;color:var(--muted);margin-top:6px;min-height:18px}
.status.error{color:var(--red)}
.status.listening{color:var(--red);font-weight:600}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:18px;margin-bottom:16px}
.result{font-size:14px;color:var(--text);margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;min-height:40px;word-break:break-word}
.note{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6}
</style>
</head>
<body>

<h2>🎤 Speech-to-Text Test</h2>

<div class="card">
  <div class="form-group">
    <label class="form-label">Description (विवरण)</label>
    <div class="input-row">
      <input type="text" id="desc1" placeholder="Speak or type...">
      <div class="mic-btn" id="mic1" onclick="toggleMic('desc1','mic1','status1')">🎤</div>
    </div>
    <div class="status" id="status1"></div>
  </div>
</div>

<div class="card">
  <div class="form-group">
    <label class="form-label">Note (नोट)</label>
    <div class="input-row">
      <input type="text" id="desc2" placeholder="Speak or type...">
      <div class="mic-btn" id="mic2" onclick="toggleMic('desc2','mic2','status2')">🎤</div>
    </div>
    <div class="status" id="status2"></div>
  </div>
</div>

<div class="card">
  <div class="form-group">
    <label class="form-label">Try these phrases:</label>
    <div class="note">
      • "Raju ka cement"<br>
      • "Wholesale order"<br>
      • "Chai patti laya"<br>
      • "Steel ka payment"<br>
      • "Labour charge"<br>
      • "दो बोरी सीमेंट"
    </div>
  </div>
</div>

<div class="card">
  <div class="form-label">Browser Support</div>
  <div class="result" id="support-check"></div>
</div>

<script>
// Check browser support
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const supportEl = document.getElementById('support-check');

if(!SpeechRecognition){
  supportEl.innerHTML = '❌ Speech Recognition NOT supported in this browser. Use Chrome or Edge.';
  supportEl.style.color = '#DC2626';
} else {
  supportEl.innerHTML = '✅ Speech Recognition supported!';
  supportEl.style.color = '#059669';
}

// Active recognition instance
let activeRecognition = null;
let activeInputId = null;

function toggleMic(inputId, micId, statusId){
  if(!SpeechRecognition){
    document.getElementById(statusId).textContent = '❌ Not supported — use Chrome';
    document.getElementById(statusId).className = 'status error';
    return;
  }

  const micBtn = document.getElementById(micId);
  const statusEl = document.getElementById(statusId);
  const inputEl = document.getElementById(inputId);

  // If already listening on this input — stop
  if(activeRecognition && activeInputId === inputId){
    activeRecognition.stop();
    return;
  }

  // If listening on another input — stop that first
  if(activeRecognition){
    activeRecognition.stop();
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-IN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  activeRecognition = recognition;
  activeInputId = inputId;

  micBtn.classList.add('listening');
  statusEl.textContent = '🔴 Listening... speak now';
  statusEl.className = 'status listening';

  let finalTranscript = inputEl.value;

  recognition.onresult = function(event){
    let interim = '';
    for(let i = event.resultIndex; i < event.results.length; i++){
      const transcript = event.results[i][0].transcript;
      if(event.results[i].isFinal){
        // Append to existing text with space
        finalTranscript = (finalTranscript ? finalTranscript + ' ' : '') + transcript.trim();
        inputEl.value = finalTranscript;
      } else {
        interim = transcript;
      }
    }
    // Show interim in input (preview while speaking)
    if(interim){
      inputEl.value = (finalTranscript ? finalTranscript + ' ' : '') + interim;
    }
  };

  recognition.onend = function(){
    micBtn.classList.remove('listening');
    statusEl.textContent = inputEl.value ? '✅ Done' : '';
    statusEl.className = 'status';
    activeRecognition = null;
    activeInputId = null;
    // Clear status after 2 sec
    setTimeout(()=>{ if(statusEl.textContent === '✅ Done') statusEl.textContent = ''; }, 2000);
  };

  recognition.onerror = function(event){
    micBtn.classList.remove('listening');
    activeRecognition = null;
    activeInputId = null;
    if(event.error === 'no-speech'){
      statusEl.textContent = 'No speech detected — try again';
      statusEl.className = 'status';
    } else if(event.error === 'not-allowed'){
      statusEl.textContent = '❌ Mic permission denied — check settings';
      statusEl.className = 'status error';
    } else {
      statusEl.textContent = '❌ Error: ' + event.error;
      statusEl.className = 'status error';
    }
  };

  recognition.start();
}
</script>
</body>
</html>
